name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: protein-engine-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: protein-engine-linux-aarch64
            use_cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --features native --bin protein-engine --target ${{ matrix.target }}
          else
            cargo build --release --features native --bin protein-engine --target ${{ matrix.target }}
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/protein-engine dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: |
          chmod +x build-wasm.sh
          ./build-wasm.sh
      - name: Package WASM
        run: tar czf protein-engine-wasm.tar.gz -C web pkg
      - uses: actions/upload-artifact@v4
        with:
          name: protein-engine-wasm
          path: protein-engine-wasm.tar.gz

  build-rvf:
    name: Build RVF
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build RVF
        run: |
          chmod +x build-rvf.sh
          ./build-rvf.sh
      - uses: actions/upload-artifact@v4
        with:
          name: protein-engine-rvf
          path: protein-engine.rvf

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [build, build-wasm, build-rvf]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/protein-engine-linux-x86_64
            artifacts/protein-engine-linux-aarch64
            artifacts/protein-engine-wasm.tar.gz
            artifacts/protein-engine.rvf
