name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --all

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features native -- -D warnings

  test-native:
    name: Test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features native

  test-wasm:
    name: Test (WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --target wasm32-unknown-unknown -p pe-core -p pe-quantum-wasm

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM package
        run: wasm-pack build crates/pe-wasm --target web --release --out-dir ../../web/pkg
      - name: Check bundle size
        run: |
          WASM_FILE=$(find web/pkg -name '*.wasm' -type f | head -1)
          if [ -z "$WASM_FILE" ]; then
            echo "ERROR: No .wasm file found"
            exit 1
          fi
          SIZE=$(stat --format=%s "$WASM_FILE")
          SIZE_MB=$((SIZE / 1048576))
          echo "WASM bundle: $(du -h "$WASM_FILE" | cut -f1)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "ERROR: WASM bundle exceeds 10 MB limit (${SIZE_MB} MB)"
            exit 1
          fi

  cross-compile:
    name: Cross-compile (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Install cross
        run: cargo install cross --locked
      - run: cross build --target aarch64-unknown-linux-gnu --features native

  build-rvf:
    name: Build RVF
    runs-on: ubuntu-latest
    needs: [test-native]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build and assemble RVF
        run: |
          chmod +x build-rvf.sh
          ./build-rvf.sh
      - name: Validate RVF artifact
        run: |
          test -f protein-engine.rvf
          SIZE=$(stat --format=%s protein-engine.rvf)
          echo "RVF size: $(du -h protein-engine.rvf | cut -f1)"
          test "$SIZE" -gt 0

  docker:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: [test-native]
    steps:
      - uses: actions/checkout@v4
      - name: Build and run stack
        run: |
          docker compose -f docker-compose.yml build
          docker compose -f docker-compose.yml up -d
          sleep 10
          # Smoke test: hit health endpoint
          curl -f http://localhost:8080/health || (docker compose logs && exit 1)
          curl -f http://localhost:8100/health || (docker compose logs && exit 1)
          docker compose down

  sidecar-tests:
    name: Sidecar tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test
        working-directory: services/chemiq-sidecar
        run: |
          pip install fastapi uvicorn pydantic numpy httpx pytest
          pytest test_sidecar.py -v

  e2e-cli:
    name: E2E CLI smoke tests
    runs-on: ubuntu-latest
    needs: [test-native]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run CLI E2E tests
        run: |
          chmod +x tests/e2e/test_cli.sh
          ./tests/e2e/test_cli.sh

  e2e-docker:
    name: E2E Docker smoke tests
    runs-on: ubuntu-latest
    needs: [test-native, sidecar-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run Docker E2E tests
        run: |
          chmod +x tests/e2e/test_docker_stack.sh
          ./tests/e2e/test_docker_stack.sh
