[target.wasm32-unknown-unknown]
rustflags = [
    "-C", "opt-level=z",
]

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "opt-level=3",
    "-C", "target-cpu=native",
]

# Raspberry Pi 4
[target.aarch64-unknown-linux-gnu]
linker    = "aarch64-linux-gnu-gcc"
rustflags = ["-C", "opt-level=3"]
